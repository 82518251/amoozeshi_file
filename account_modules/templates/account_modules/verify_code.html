{% extends 'base.html' %}

{% block page_title %}
	صفحه تایید کد
{% endblock %}

{% block page_content %}

    <div class="container py-4 py-lg-5 my-4">
        <div class="row">
            <center>

          <div class="col-md-6">
            <div class="card border-0 shadow">
              <div class="card-body">
                <h2 class="h4 mb-1">کد فراموشی رمز</h2>
                <div class="py-3">
                  <h3 class="d-inline-block align-middle fs-base fw-medium mb-2 me-2">با حساب اجتماعی:</h3>
                  <div class="d-inline-block align-middle"><a class="btn-social bs-google me-2 mb-2" href="#" data-bs-toggle="tooltip" title="گوگل"><i class="ci-google"></i></a><a class="btn-social bs-facebook me-2 mb-2" href="#" data-bs-toggle="tooltip" title="فیسبوک"><i class="ci-facebook"></i></a><a class="btn-social bs-twitter me-2 mb-2" href="#" data-bs-toggle="tooltip" title="توییتر"><i class="ci-twitter"></i></a></div>
                </div>
                <hr>
                <h3 class="fs-base pt-4 pb-2">یا از فرم زیر استفاده کنید</h3>
                <form method="post" class="needs-validation" novalidate>
                    {% csrf_token %}
                  <div class="input-group mb-3">
                      {{ verify_form.verification_code }}
                      {{ verify_form.verification_code.errors }}
                  </div>

                  <div class="d-flex flex-wrap justify-content-between">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" checked id="remember_me">
                      <label class="form-check-label" for="remember_me">به خاطر سپردن</label>
                    </div><a class="nav-link-inline fs-sm" href="{% url 'forget_page' %}">فراموشی رمز ؟ </a>
                  </div>
                  <hr class="mt-4">
                  <div class="text-end pt-4">
                    <button class="btn btn-primary" type="submit"><i class="ci-sign-in me-2 ms-n21"></i>تایید</button>
                  </div>
                </form>
              </div>
            </div>
          </div>

            </center>

        </div>
    </div>

{% endblock %}
