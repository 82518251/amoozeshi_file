{% extends 'base.html' %}

{% load static %}

{% block page_title %}

{% endblock %}

{% block page_content %}

  <div class="container py-4 py-lg-5 my-4">
        <div class="row">
            <center>
          <div class="col-md-6">
            <div class="card border-0 shadow">
              <div class="card-body">
                <h2 class="h4 mb-1">تغییر رمز عبور</h2>
                <div class="py-3">


                <form class="needs-validation"  method="post" novalidate>
                    {% csrf_token %}

                    <div class="input-group mb-3">

                        {{ reset_form.password }}
                        {{ reset_form.password.errors }}
                    </div>

                       <div class="input-group mb-3">

                        {{ reset_form.confirm_password }}
                        {{ reset_form.confirm_password.errors }}
                    </div>





                  <hr class="mt-4">
                  <div class="text-end pt-4">
                    <button class="btn btn-primary" type="submit"><i class="ci-sign-in me-2 ms-n21"></i>تغییر رمز</button>
                  </div>
                </form>
              </div>
            </div>
          </div>

      </div>
                </center>
        </div>
  </div>
{% endblock %}
