{% extends 'base.html' %}

{% load static %}

{% block page_title %}

{% endblock %}

{% block page_content %}
<center>


     <div class="container py-4 py-lg-5 my-4">
        <div class="row">

          <div class="col-md-6">
            <div class="card border-0 shadow">
              <div class="card-body">
                <h2 class="h4 mb-1">فراموشی رمز عبور</h2>
                <div class="py-3">


                <form class="needs-validation"  method="post" novalidate>
                    {% csrf_token %}

                    <div class="input-group mb-3">

                        {{ forget_form.email }}
                        {{ forget_form.email.errors }}
                    </div>



                  <hr class="mt-4">
                  <div class="text-end pt-4">
                    <button class="btn btn-primary" type="submit"><i class="ci-sign-in me-2 ms-n21"></i>ارسال ایمیل</button>
                  </div>
                </form>
              </div>
            </div>
          </div>

      </div>
        </div>
      </div>
</center>
{% endblock %}
